<!doctype html>
<html lang="en" xmlns:th ="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<form th:action="@{|/todos/update|}" th:object="${editTodo}" method="post">
    <div class="form-group">
        <label>ID</label>
        <input type="text"
               class="form-control" th:field="*{id}">
        <p th:errors="*{id}" class="text-danger"></p>
    </div>
    <div class="form-group">
        <label th:text="#{content}"></label>
        <input type="text"
               class="form-control" th:field="*{content}">
        <p th:errors="*{content}" class="text-danger"></p>
    </div>
    <div class="form-group">
        <label th:text="#{duedate}">DueDate</label>
        <br>
        <label>
            <input type="date" th:field="*{dueDate}">
        </label>
        <p th:errors="*{dueDate}" class="text-danger"></p>
    </div>
    <label th:text="#{priority}">Priority</label>
    <select th:field="*{priority}">
        <option value="LOW" th:text="#{priority_low}"></option>
        <option value="MEDIUM" th:text="#{priority_medium}"></option>
        <option value="HIGH" th:text="#{priority_high}"></option>
    </select>
    <br>
    <label th:text="#{status}"></label>
    <select th:field="*{status}">
        <option value="true" th:text="#{status_true}"></option>
        <option value="false" th:text="#{status_false}"></option>
    </select>
    <p th:errors="*{priority}" class="text-danger"></p>
    <br>
    <button type="submit" class="btn btn-primary">Submit</button>
</form>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
